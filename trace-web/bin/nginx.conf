worker_rlimit_nofile 65535;
worker_processes  4;
worker_cpu_affinity 0001 0010 0100 1000;

pid        /var/run/nginx.pid;
error_log  logs/error.log warn;

events {
    worker_connections  40960;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '#$time_local $status $request_time '
                '#$request_method $request_uri $body_bytes_sent $proxy_add_x_forwarded_for $remote_addr '
                '#$upstream_status $upstream_response_time $upstream_addr ';
    access_log  logs/access.log  main;

    server_tokens off;
    tcp_nopush on;
    tcp_nodelay on;
    sendfile        on;
    keepalive_timeout  65;

    charset utf-8;

    proxy_ignore_client_abort off;

    proxy_http_version 1.1;

    proxy_pass_header   Server;
    proxy_set_header    Host                $host;
    proxy_set_header    X-Real-IP           $remote_addr;
    proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto   $scheme;
    proxy_set_header    Connection          "";
    more_set_headers    X-Frame-Options     SAMEORIGIN;

    proxy_temp_path         logs/temp_proxy         1 2 3;
    client_body_temp_path   logs/temp_client_body   1 2 3;
    uwsgi_temp_path         logs/temp_uwsgi         1 2 3;
    fastcgi_temp_path       logs/temp_fastcgi       1 2 3;
    scgi_temp_path          logs/temp_scgi          1 2 3;

    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;

    include nginx.*.conf;

}
